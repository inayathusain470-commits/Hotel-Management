<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - Royal Plaza Hotel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <span class="logo-crown">&#x2756;</span>
                <div class="logo-brand">
                    <span class="logo-name">Royal Plaza</span>
                    <span class="logo-tagline">&#10022; Hotel &#10022;</span>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="rooms.html">Rooms & Bar</a></li>
                <li><a href="food_menu.html">Food Menu</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="my_cart.html">My Cart</a></li>
                <li><a href="admin_dashboard.html">Dashboard</a></li>
                <li><a href="admin_login.html">Admin Login</a></li>
                <li><a href="staff_login.html">Staff Login</a></li>
                <li><a href="customer_login.html">Customer Login</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <section class="login">
        <div class="container">
            <h2>Customer Login</h2>
            <div id="customer-login-error" class="error-msg" style="margin-bottom:10px;"></div>
            <form id="customer-login-form">
                <div class="form-group">
                    <label for="customer-email">Email</label>
                    <input type="email" id="customer-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="customer-password">Password</label>
                    <input type="password" id="customer-password" name="password" required>
                </div>
                <button type="submit" class="submit-btn">Login</button>
            </form>
            <div style="text-align: center;">
                <button type="button" onclick="openForgotPasswordModal(event)" class="forgot-password-btn">
                    🔑 Forgot Password?
                </button>
            </div>
        </div>
    </section>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; flex-direction: column;">
        <div style="background: white; padding: 40px; border-radius: 10px; max-width: 500px; width: 90%; box-shadow: 0 5px 20px rgba(0,0,0,0.3);">
            <h3 style="text-align: center; color: #333; margin-bottom: 10px;">Reset Your Password</h3>
            <p style="text-align: center; color: #666; margin-bottom: 20px; font-size: 14px;">Enter your email to receive a reset code</p>
            
            <div id="forgot-step-1">
                <div id="forgot-error" class="error-msg" style="margin-bottom: 10px;"></div>
                <div id="forgot-success" class="success-msg" style="margin-bottom: 10px; display: none;"></div>
                
                <div class="form-group">
                    <label for="forgot-email">Email</label>
                    <input type="email" id="forgot-email" placeholder="Enter your email" required>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button onclick="sendPasswordResetCode()" class="submit-btn" style="flex: 1;">Send Reset Code</button>
                    <button onclick="lookupPassword()" class="submit-btn" style="flex: 1; background: #D4AF37;">Lookup Password</button>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button onclick="closeForgotPasswordModal()" class="submit-btn" style="flex: 1; background: #999;">Cancel</button>
                </div>
            </div>

            <div id="forgot-step-2" style="display: none;">
                <div id="reset-error" class="error-msg" style="margin-bottom: 10px;"></div>
                <div id="reset-success" class="success-msg" style="margin-bottom: 10px; display: none;"></div>
                
                <div class="form-group">
                    <label for="reset-code">Reset Code (6 digits)</label>
                    <input type="text" id="reset-code" placeholder="Enter the 6-digit code" maxlength="6" required>
                </div>
                
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" placeholder="Enter new password" required>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm password" required>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button onclick="resetPassword()" class="submit-btn" style="flex: 1;">Reset Password</button>
                    <button onclick="goBackToForgotStep1()" class="submit-btn" style="flex: 1; background: #999;">Back</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let resetEmailForVerification = '';

        async function loginCustomerApi(email, password) {
            const response = await fetch('http://localhost:5000/api/customers/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) throw new Error(payload.error || 'Login failed');
            return payload.customer;
        }

        document.getElementById('customer-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('customer-email').value.trim();
            const password = document.getElementById('customer-password').value;

            let user = null;
            try {
                user = await loginCustomerApi(email, password);
            } catch (apiErr) {
                const users = JSON.parse(localStorage.getItem('customers') || '[]');
                user = users.find(u => u.email === email && u.password === password) || null;
            }

            if (!user) {
                document.getElementById('customer-login-error').textContent = 'Invalid email or password';
                return;
            }

            localStorage.setItem('currentUser', JSON.stringify({
                type: 'customer',
                name: user.name,
                email: user.email,
                phone: user.phone
            }));
            window.location.href = 'home.html';
        });

        // Forgot Password Functions
        function openForgotPasswordModal(event) {
            event.preventDefault();
            document.getElementById('forgotPasswordModal').style.display = 'flex';
            // Clear previous values
            document.getElementById('forgot-email').value = '';
            document.getElementById('forgot-error').textContent = '';
            document.getElementById('forgot-success').textContent = '';
            document.getElementById('forgot-success').style.display = 'none';
            resetErrorMessages();
        }

        function closeForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').style.display = 'none';
            document.getElementById('forgot-step-1').style.display = 'block';
            document.getElementById('forgot-step-2').style.display = 'none';
            resetErrorMessages();
        }

        function resetErrorMessages() {
            document.getElementById('forgot-error').textContent = '';
            document.getElementById('forgot-success').textContent = '';
            document.getElementById('forgot-success').style.display = 'none';
            document.getElementById('reset-error').textContent = '';
            document.getElementById('reset-success').textContent = '';
            document.getElementById('reset-success').style.display = 'none';
        }

        async function sendPasswordResetCode() {
            const email = document.getElementById('forgot-email').value.trim();
            const errorDiv = document.getElementById('forgot-error');
            const successDiv = document.getElementById('forgot-success');

            if (!email) {
                errorDiv.textContent = 'Please enter your email';
                return;
            }

            try {
                const response = await fetch('http://localhost:5000/api/customers/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorDiv.textContent = data.error || 'Failed to send reset code';
                    return;
                }

                resetEmailForVerification = email;
                errorDiv.textContent = '';
                successDiv.textContent = '✅ ' + (data.message || 'Reset code sent to your email');
                successDiv.style.display = 'block';

                // Show step 2 after 2 seconds
                setTimeout(() => {
                    document.getElementById('forgot-step-1').style.display = 'none';
                    document.getElementById('forgot-step-2').style.display = 'block';
                    document.getElementById('reset-code').focus();
                }, 2000);
            } catch (err) {
                errorDiv.textContent = 'Error: ' + err.message;
            }
        }

        function goBackToForgotStep1() {
            document.getElementById('forgot-step-1').style.display = 'block';
            document.getElementById('forgot-step-2').style.display = 'none';
            resetErrorMessages();
        }

        async function resetPassword() {
            const resetCode = document.getElementById('reset-code').value.trim();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('reset-error');
            const successDiv = document.getElementById('reset-success');

            errorDiv.textContent = '';
            successDiv.textContent = '';
            successDiv.style.display = 'none';

            if (!resetCode || !newPassword || !confirmPassword) {
                errorDiv.textContent = 'Please fill all fields';
                return;
            }

            if (resetCode.length !== 6 || isNaN(resetCode)) {
                errorDiv.textContent = 'Reset code must be 6 digits';
                return;
            }

            if (newPassword.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                return;
            }

            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                return;
            }

            try {
                const response = await fetch('http://localhost:5000/api/customers/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: resetEmailForVerification,
                        resetCode: resetCode,
                        newPassword: newPassword
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorDiv.textContent = data.error || 'Failed to reset password';
                    return;
                }

                successDiv.textContent = '✅ Password reset successfully! Logging you in...';
                successDiv.style.display = 'block';

                // Auto login
                setTimeout(() => {
                    const customer = data.customer;
                    localStorage.setItem('currentUser', JSON.stringify({
                        type: 'customer',
                        name: customer.name,
                        email: customer.email,
                        phone: customer.phone
                    }));
                    closeForgotPasswordModal();
                    window.location.href = 'home.html';
                }, 2000);
            } catch (err) {
                errorDiv.textContent = 'Error: ' + err.message;
            }
        }

        // Close modal when clicking outside
        document.getElementById('forgotPasswordModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeForgotPasswordModal();
            }
        });

        // Password Lookup Function
        async function lookupPassword() {
            const email = document.getElementById('forgot-email').value.trim();
            const errorDiv = document.getElementById('forgot-error');
            const successDiv = document.getElementById('forgot-success');

            if (!email) {
                errorDiv.textContent = 'Please enter your email';
                return;
            }

            try {
                const response = await fetch('http://localhost:5000/api/customers/lookup-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorDiv.textContent = data.error || 'Email not found';
                    successDiv.style.display = 'none';
                    return;
                }

                errorDiv.textContent = '';
                successDiv.innerHTML = `✅ <strong>Password Found!</strong><br/>Hello ${data.name}!<br/>Your password is: <strong>${data.password}</strong>`;
                successDiv.style.display = 'block';
            } catch (err) {
                errorDiv.textContent = 'Error: ' + err.message;
                successDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
