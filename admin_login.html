<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Royal Plaza Hotel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <span class="logo-crown">&#x2756;</span>
                <div class="logo-brand">
                    <span class="logo-name">Royal Plaza</span>
                    <span class="logo-tagline">&#10022; Hotel &#10022;</span>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="rooms.html">Rooms & Bar</a></li>
                <li><a href="food_menu.html">Food Menu</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="my_cart.html">My Cart</a></li>
                <li><a href="admin_dashboard.html">Dashboard</a></li>
                <li><a href="admin_login.html">Admin Login</a></li>
                <li><a href="staff_login.html">Staff Login</a></li>
                <li><a href="customer_login.html">Customer Login</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <section class="login">
        <div class="container">
            <h2>Admin Login</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-username">Username</label>
                    <input type="text" id="admin-username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" name="password" required>
                </div>
                <button type="submit" class="submit-btn">Login</button>
            </form>
            <div id="admin-panel" style="display: none;">
                <h3>All Bookings</h3>
                <div id="bookings-list"></div>
                <h3>All Food Orders</h3>
                <div id="food-orders-list"></div>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('admin-username').value;
            const password = document.getElementById('admin-password').value;
            if (username === 'inayat' && password === 'inayat786') {
                // Hide form and show admin panel
                document.getElementById('admin-login-form').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                
                // Display bookings
                const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
                const bookingsList = document.getElementById('bookings-list');
                if (bookings.length === 0) {
                    bookingsList.innerHTML = '<p>No bookings yet.</p>';
                } else {
                    let html = '<ul>';
                    bookings.forEach((booking, index) => {
                        html += `<li>
                            <strong>Booking ${index + 1}:</strong><br>
                            Name: ${booking.name}<br>
                            Email: ${booking.email}<br>
                            Phone: ${booking.phone}<br>
                            Password: ${booking.password}<br>
                            Check-in: ${booking.checkin}<br>
                            Check-out: ${booking.checkout}<br>
                            Room: ${booking.roomType}<br>
                            Price: ₹${booking.priceInr} per night
                        </li><br>`;
                    });
                    html += '</ul>';
                    bookingsList.innerHTML = html;
                }

                // Display food orders
                const foodOrders = JSON.parse(localStorage.getItem('foodOrders') || '[]');
                const foodOrdersList = document.getElementById('food-orders-list');
                if (foodOrders.length === 0) {
                    foodOrdersList.innerHTML = '<p>No food orders yet.</p>';
                } else {
                    let html = '<ul>';
                    foodOrders.forEach((order, index) => {
                        html += `<li>
                            <strong>Order ${index + 1}:</strong><br>
                            Name: ${order.name}<br>
                            Room: ${order.room}<br>
                            Phone: ${order.phone}<br>
                            Address: ${order.address}<br>
                            Items: ${order.items.map(item => `${item.item} x ${item.quantity}`).join(', ')}<br>
                            Total: ₹${order.total}<br>
                            Time: ${new Date(order.timestamp).toLocaleString()}
                        </li><br>`;
                    });
                    html += '</ul>';
                    foodOrdersList.innerHTML = html;
                }
            } else {
                alert('Invalid username or password');
            }
        });
    </script>

    <!-- AI Chatbot Widget (ChatGPT Style) -->
    <div id="ai-chatbot" style="position:fixed;bottom:20px;right:20px;width:0;height:0;opacity:0;transition:all 0.3s ease;z-index:9999;box-shadow:0 5px 40px rgba(0,0,0,0.16),0 0 0 1px rgba(0,0,0,0.05);border-radius:12px;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;">
        <div style="width:360px;height:480px;background:white;display:flex;flex-direction:column;border-radius:12px;box-shadow:0 20px 25px rgba(0,0,0,0.1);">
            <div style="background:linear-gradient(180deg, #0d47a1 0%, #1565c0 100%);color:white;padding:14px;display:flex;justify-content:space-between;align-items:center;cursor:default;border-radius:12px 12px 0 0;flex-shrink:0;">
                <div style="min-width:0;flex:1;">
                    <h3 style="margin:0;font-size:15px;font-weight:600;letter-spacing:0.5px;word-break:break-word;">🤖 AI Assistant</h3>
                    <small style="opacity:0.85;font-size:11px;word-break:break-word;">Always here to help</small>
                </div>
                <button onclick="closeAIChat()" style="background:rgba(255,255,255,0.2);border:none;color:white;font-size:18px;cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:background 0.2s;flex-shrink:0;margin-left:10px;">✕</button>
            </div>
            <div id="ai-chat-messages" style="flex:1;overflow-y:auto;padding:12px;background:#f5f5f5;display:flex;flex-direction:column;gap:10px;word-wrap:break-word;word-break:break-word;"></div>
            <div style="padding:10px;border-top:1px solid #e5e5e5;display:flex;gap:8px;background:white;border-radius:0 0 12px 12px;flex-shrink:0;">
                <input type="text" id="ai-question" placeholder="Ask..." style="flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none;background:#f5f5f5;transition:border 0.2s;min-width:0;word-wrap:break-word;" onfocus="this.style.borderColor='#0d47a1';this.style.background='white'" onblur="this.style.borderColor='#ddd';this.style.background='#f5f5f5'">
                <button onclick="askAI()" style="background:linear-gradient(135deg, #0d47a1 0%, #1565c0 100%);color:white;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;transition:transform 0.2s;flex-shrink:0;white-space:nowrap;" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='translateY(0)'">Send</button>
            </div>
        </div>
    </div>

    <!-- Floating Chat Button (ChatGPT Style) -->
    <button id="ai-chat-toggle" onclick="openAIChat()" style="position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg, #0d47a1 0%, #1565c0 100%);color:white;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 12px rgba(13,71,161,0.4);transition:all 0.3s;z-index:9998;" onmouseover="this.style.transform='scale(1.1)';this.style.boxShadow='0 6px 20px rgba(13,71,161,0.5)'" onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 4px 12px rgba(13,71,161,0.4)'">
        💬
    </button>

    <script src="js/script.js"></script>
</body>
</html>
